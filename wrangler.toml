name = "proclean-organizers"
compatibility_date = "2024-09-23"

# Build output directory for Cloudflare Pages
pages_build_output_dir = "dist/client"

# Required for Node.js built-ins (crypto, fs, path) used in server functions
compatibility_flags = ["nodejs_compat"]

# ---------------------------------------------------------------------------
# KV namespace — stores all editable site content (text, prices, image URLs).
# SETUP (do this once in Cloudflare dashboard, then uncomment the block below):
# 1. Workers & Pages → KV → Create namespace → name it "proclean-site-content"
# 2. Copy the namespace ID and paste it as the "id" value below
# 3. Uncomment the [[kv_namespaces]] block
# 4. Seed the KV: wrangler kv:key put --namespace-id=<YOUR_ID> "site-content" --path=data/site-content.seed.json
# Until then, the site reads from data/site-content.seed.json (fully functional, admin saves won't persist).
# ---------------------------------------------------------------------------
# [[kv_namespaces]]
# binding = "SITE_CONTENT"
# id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# ---------------------------------------------------------------------------
# Secrets — do NOT put real values here. Set them via:
#   wrangler secret put ADMIN_PASSWORD
#   wrangler secret put SMTP_USER
#   wrangler secret put SMTP_PASS
# Or paste them in the Cloudflare dashboard:
#   Workers & Pages → proclean-organizers → Settings → Environment Variables → Add secret
# ---------------------------------------------------------------------------
# ADMIN_PASSWORD  (the /admin login password)
# SMTP_USER       (Gmail address for contact form delivery)
# SMTP_PASS       (Gmail App Password — NOT your regular password)
